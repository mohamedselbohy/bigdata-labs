version: "3.8"
services:
  namenode:
    image: apache/hadoop:3.4
    container_name: namenode
    hostname: namenode
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - namenode-data:/hadoop/dfs/name
    ports:
      - "9870:9870"
      - "9000:9000"
    command:
      [
        "bash",
        "-c",
        "sudo chown -R hadoop:users /hadoop && if [ ! -f /hadoop/dfs/name/current/VERSION ]; then hdfs namenode -format -force -nonInteractive; fi && hdfs namenode",
      ]

  resourcemanager:
    image: apache/hadoop:3.4
    container_name: resourcemanager
    environment:
      - WAITFOR=namenode:9000
    hostname: resourcemanager
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
    ports:
      - "8088:8088"
    command: ["yarn", "resourcemanager"]

  historyserver:
    image: apache/hadoop:3.4
    container_name: historyserver
    environment:
      - WAITFOR=resourcemanager:8088
    hostname: historyserver
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
    ports:
      - "19888:19888"
    command: ["mapred", "historyserver"]

  datanode1:
    image: apache/hadoop:3.4
    container_name: datanode1
    environment:
      - WAITFOR=namenode:9000
    hostname: datanode1
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - datanode1-data:/hadoop/dfs/data
    command:
      [
        "bash",
        "-c",
        "sudo chown -R hadoop:users /hadoop && hdfs --daemon start datanode && yarn nodemanager",
      ]

  datanode2:
    image: apache/hadoop:3.4
    container_name: datanode2
    environment:
      - WAITFOR=namenode:9000
    hostname: datanode2
    volumes:
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
      - ./config/mapred-site.xml:/opt/hadoop/etc/hadoop/mapred-site.xml:ro
      - ./config/yarn-site.xml:/opt/hadoop/etc/hadoop/yarn-site.xml:ro
      - datanode2-data:/hadoop/dfs/data
    command:
      [
        "bash",
        "-c",
        "sudo chown -R hadoop:users /hadoop && hdfs --daemon start datanode && yarn nodemanager",
      ]

volumes:
  namenode-data:
  datanode1-data:
  datanode2-data:
